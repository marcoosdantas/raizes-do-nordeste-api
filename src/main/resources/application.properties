spring.application.name=raizes-do-nordeste-api
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/raizesdonordeste}
spring.threads.virtual.enabled=true
server.port=8080

# JWT
app.jwt.secret=${JWT_SECRET:raizes-secret-key-deve-ter-256-bits-minimo-aqui}
app.jwt.expiration=3600000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=tag
